[recording]
	#Number of ticks between route recording samples.
	# Default: 10
	# Range: 1 ~ 1200
	sampleIntervalTicks = 10
	#Minimum distance between saved route points.
	# Default: 1.0
	# Range: 0.0 ~ 1024.0
	minDistanceBetweenPoints = 1.0
	#Maximum number of route points stored per route.
	# Default: 5000
	# Range: 2 ~ 100000
	maxRoutePoints = 5000

[playback]
	#Default route playback mode.
	#Allowed Values: PING_PONG, ONE_WAY
	mode = "PING_PONG"
	#Maximum playback speed multiplier.
	# Default: 1.0
	# Range: 0.1 ~ 10.0
	maxSpeedMultiplier = 1.0
	#Maximum distance from the nearest route endpoint allowed when beginning playback.
	# Default: 24.0
	# Range: 0.0 ~ 512.0
	maxStartJoinDistance = 24.0
	#Stop automated playback when collision is detected.
	stopOnCollision = true
	#Stop automated playback when an unrecoverable error is detected.
	stopOnError = true
	#How many times longer than the recorded segment duration playback may take before overdue stuck monitoring begins.
	# Default: 3.0
	# Range: 1.0 ~ 20.0
	segmentOverrunMultiplier = 3.0
	#Minimum net distance in blocks an overdue segment must gain toward its target before the overdue stuck timer is reset.
	# Default: 0.25
	# Range: 0.01 ~ 32.0
	minMeaningfulProgressDistance = 0.25
	#Maximum ticks an overdue segment may continue without meaningful net progress before playback pauses in a fault hold.
	# Default: 200
	# Range: 20 ~ 36000
	stuckTimeoutTicks = 200

[visuals]
	#Show route previews while viewing or editing a route.
	showRoutePreview = true
	#Maximum route preview range in blocks.
	# Default: 128
	# Range: 0 ~ 1024
	previewRange = 128

[docking]
	#Search radius in blocks for finding exactly one ground-side Docking Connector near an Airship Station.
	# Default: 24
	# Range: 1 ~ 128
	stationDockSearchRadius = 24
	#Search radius in blocks for finding exactly one ship-side Docking Connector near a Ship Transponder on an assembled ship.
	# Default: 24
	# Range: 1 ~ 128
	shipDockSearchRadius = 24
	#Maximum ticks to wait for station and ship Docking Connectors to lock after a docking stop starts.
	# Default: 200
	# Range: 20 ~ 12000
	dockLockTimeoutTicks = 200
	#Maximum ticks to wait for dock transfer activity to become idle before continuing.
	# Default: 2400
	# Range: 20 ~ 36000
	dockIdleTimeoutTicks = 2400
	#Maximum ticks to wait for dock-visible cargo threshold conditions before failing playback.
	# Default: 2400
	# Range: 20 ~ 36000
	dockCargoTimeoutTicks = 2400

[limits]
	#Maximum number of simultaneously active automated vehicles per player.
	# Default: 8
	# Range: 0 ~ 1024
	maxActiveVehiclesPerPlayer = 8
	#Restrict Ship Transponder and Airship Station control actions to the owner and server operators.
	restrictTransponderControlToOwner = true
	#Require players to crouch while mining Airship Stations and Ship Transponders, because breaking them removes related routes.
	requireCrouchToBreakRouteBlocks = true

[debug]
	#Enable verbose automated logistics debug logging.
	debugLogging = false
